services:
  postgres:
    profiles: ["local-db"]
    image: postgres:16-alpine
    container_name: spendit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-expense_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - spendit-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-expense_tracker}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spendit-backend
    restart: unless-stopped
    environment:
      PORT: ${BACKEND_PORT:-8080}
      LOG_LEVEL: ${BACKEND_LOG_LEVEL:-info}
      DATABASE_URL: ${BACKEND_DATABASE_URL:-}
      DB_HOST: ${BACKEND_DB_HOST:-spendit-postgres}
      DB_PORT: ${BACKEND_DB_PORT:-5432}
      DB_USER: ${BACKEND_DB_USER:-postgres}
      DB_PASSWORD: ${BACKEND_DB_PASSWORD:-postgres}
      DB_NAME: ${BACKEND_DB_NAME:-expense_tracker}
      DB_SSLMODE: ${BACKEND_DB_SSLMODE:-disable}
      DB_SCHEMA: ${BACKEND_DB_SCHEMA:-spendit}
      CORS_ALLOW_ORIGIN: ${BACKEND_CORS_ALLOW_ORIGIN:-http://localhost:3000}
      JWT_SECRET: ${BACKEND_JWT_SECRET:-change-me-in-production}
      JWT_TOKEN_EXPIRY_HOURS: ${BACKEND_JWT_TOKEN_EXPIRY_HOURS:-168}
    ports:
      - "${BACKEND_PORT:-8080}:${BACKEND_PORT:-8080}"
    networks:
      - spendit-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: spendit-frontend
    restart: unless-stopped
    environment:
      PORT: ${FRONTEND_PORT:-3000}
      BACKEND_API_URL: ${FRONTEND_BACKEND_API_URL:-http://backend:8080}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - spendit-net

volumes:
  pgdata:

networks:
  spendit-net:
    name: ${DOCKER_SHARED_NETWORK:-spendit-net}
    external: true
