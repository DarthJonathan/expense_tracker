services:
  postgres:
    image: postgres:16-alpine
    container_name: spendit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-expense_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-expense_tracker}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spendit-backend
    restart: unless-stopped
    environment:
      PORT: ${BACKEND_PORT:-8080}
      LOG_LEVEL: ${BACKEND_LOG_LEVEL:-info}
      DATABASE_URL: ${BACKEND_DATABASE_URL:-postgres://postgres:postgres@postgres:5432/expense_tracker?sslmode=disable}
      CORS_ALLOW_ORIGIN: ${BACKEND_CORS_ALLOW_ORIGIN:-http://localhost:3000}
      JWT_SECRET: ${BACKEND_JWT_SECRET:-change-me-in-production}
      JWT_TOKEN_EXPIRY_HOURS: ${BACKEND_JWT_TOKEN_EXPIRY_HOURS:-168}
    ports:
      - "${BACKEND_PORT:-8080}:${BACKEND_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: spendit-frontend
    restart: unless-stopped
    environment:
      PORT: ${FRONTEND_PORT:-3000}
      API_BASE_URL: ${FRONTEND_API_BASE_URL:-http://localhost:8080}
      VITE_API_BASE_URL: ${FRONTEND_VITE_API_BASE_URL:-http://localhost:8080}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  pgdata:
