name: publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          docker build ./backend --tag "ghcr.io/${OWNER_LC}/spendit-backend:latest"
          docker push "ghcr.io/${OWNER_LC}/spendit-backend:latest"

      - name: Build and push frontend image
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          docker build ./frontend --tag "ghcr.io/${OWNER_LC}/spendit-frontend:latest"
          docker push "ghcr.io/${OWNER_LC}/spendit-frontend:latest"
